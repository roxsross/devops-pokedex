services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - POKEAPI_BASE_URL=https://pokeapi.co/api/v2
      - CACHE_TTL=300
      - WORKERS=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pokeverse

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pokeverse

networks:
  pokeverse:
    driver: bridge
